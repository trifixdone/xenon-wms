<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Xenon — Worker QR Cards</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:#f8f6fd;margin:0;padding:20px;color:#241539}
  .top{max-width:700px;margin:0 auto 16px;display:flex;justify-content:space-between;align-items:center}
  button{padding:10px 18px;border:0;border-radius:8px;background:#5b21b6;color:#fff;font-weight:600;cursor:pointer}
  .cards{display:flex;flex-wrap:wrap;gap:16px;justify-content:center}
  .card{
    width:325px;height:204px; /* CR80 ID-card ratio */
    background:#fff;border:1px solid #ddd2f0;border-radius:14px;
    display:flex;overflow:hidden;box-shadow:0 2px 8px rgba(60,20,120,.10);
    page-break-inside:avoid;
  }
  .left{width:118px;background:linear-gradient(180deg,#6d28d9,#3b1f6e);color:#fff;
        display:flex;flex-direction:column;justify-content:space-between;padding:12px}
  .left .x{font-size:26px;font-weight:800;letter-spacing:.06em}
  .left .x span{color:#d8b4fe}
  .left .inst{font-size:9px;line-height:1.5;letter-spacing:.06em;text-transform:uppercase;opacity:.9}
  .right{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:10px}
  .qr{background:#fff;padding:4px}
  .name{font-size:18px;font-weight:800}
  .role{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#7c5cbf}
  @media print{
    body{background:#fff;padding:0}
    .top{display:none}
    .cards{gap:10mm;padding:10mm}
  }
</style>
</head>
<body>
<div class="top">
  <div><b>Worker QR cards</b> — print on card/paper, laminate if possible</div>
  <button onclick="window.print()">🖨 Print</button>
</div>
<div class="cards" id="cards"></div>
<script>
const WORKERS = [
  { code: "XENON-W1", name: "Mihiri" },
  { code: "XENON-W2", name: "Maneesha" },
  { code: "XENON-W3", name: "Nilundi" }
];
const box = document.getElementById("cards");
WORKERS.forEach(w=>{
  const c = document.createElement("div");
  c.className = "card";
  c.innerHTML = `
    <div class="left">
      <div class="x">X<span>e</span></div>
      <div class="inst">Xenon Higher Education Institute (Pvt) Ltd · Kalutara</div>
    </div>
    <div class="right">
      <div class="qr" id="qr-${w.code}"></div>
      <div class="name">${w.name}</div>
      <div class="role">Staff · Attendance Card</div>
    </div>`;
  box.appendChild(c);
  new QRCode(document.getElementById("qr-"+w.code), { text: w.code, width: 108, height: 108, correctLevel: QRCode.CorrectLevel.H });
});
</script>
</body>
</html>
